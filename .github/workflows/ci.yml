name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Debug environment
        run: |
          echo "Node version:"
          node -v

          echo "NPM version:"
          npm -v
          npm config get engine-strict

          echo "Current commit:"
          git rev-parse HEAD

      - name: Install dependencies
        shell: bash
        run: |
          set -o pipefail
          npm ci --verbose 2>&1 | tee npm-ci.log

      - name: Upload npm log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: npm-ci-log
          path: npm-ci.log
          if-no-files-found: warn

      - name: Upload npm debug logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: npm-debug-logs
          path: /home/runner/.npm/_logs
          if-no-files-found: warn

      - name: Run ESLint
        run: npm run lint

      - name: Check formatting
        run: npx prettier --check .
